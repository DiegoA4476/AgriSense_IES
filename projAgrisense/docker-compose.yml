services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agrisense
      POSTGRES_USER: agrisense
      POSTGRES_PASSWORD: agrisense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DB_USER: agrisense
      DB_PASSWORD: agrisense
    depends_on:
      - db

volumes:
  pgdata:
