services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    user: root
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - keycloakdata:/opt/keycloak/data/h2
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: animaldb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d animaldb"]
      interval: 10s
      timeout: 5s
      retries: 5

  sim-heart-rate:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      API_HOST: api
      SIMULATOR: sim_heart_rate
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

  sim-temperature:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      API_HOST: api
      SIMULATOR: sim_temperature
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

  sim-stress:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      API_HOST: api
      SIMULATOR: sim_stress
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

  sim-movement:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      API_HOST: api
      SIMULATOR: sim_movement
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

  sim-weight:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      API_HOST: api
      SIMULATOR: sim_weight
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/animaldb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_RABBITMQ_HOST: rabbitmq
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/agrisense
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/agrisense/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - api

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "5044:5044"
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.4
    user: root
    command: filebeat -e --strict.perms=false
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash

volumes:
  pgdata:
  keycloakdata:
  esdata:
