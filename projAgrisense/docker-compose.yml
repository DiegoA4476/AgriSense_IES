services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev --import-realm
    user: root
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - keycloakdata:/opt/keycloak/data/h2
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: animaldb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d animaldb"]
      interval: 10s
      timeout: 5s
      retries: 5

  sim-heart-rate:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      SIMULATOR: sim_heart_rate
      ANIMAL_ID: cow-001
    depends_on:
      rabbitmq:
        condition: service_healthy

  sim-temperature:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      SIMULATOR: sim_temperature
      ANIMAL_ID: cow-001
    depends_on:
      rabbitmq:
        condition: service_healthy

  sim-stress:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      SIMULATOR: sim_stress
      ANIMAL_ID: cow-001
    depends_on:
      rabbitmq:
        condition: service_healthy

  sim-movement:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      SIMULATOR: sim_movement
      ANIMAL_ID: cow-001
    depends_on:
      rabbitmq:
        condition: service_healthy

  sim-weight:
    build: ./simulator
    environment:
      RABBITMQ_HOST: rabbitmq
      SIMULATOR: sim_weight
      ANIMAL_ID: cow-001
    depends_on:
      rabbitmq:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/animaldb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: secret
      SPRING_RABBITMQ_HOST: rabbitmq
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/agrisense
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/agrisense/protocol/openid-connect/certs
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  keycloakdata:
