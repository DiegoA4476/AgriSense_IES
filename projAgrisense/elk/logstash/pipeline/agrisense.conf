input {
  beats {
    port => 5044
  }
}

filter {
  # ── Drop internal ELK monitoring noise ───────────────────────────────────
  if [container][labels][com_docker_compose_service] in ["filebeat", "logstash", "elasticsearch", "kibana"] {
    drop { }
  }

  # ── Remove conflicting fields from Filebeat/ECS metadata ─────────────────
  mutate {
    remove_field => ["[event][original]"]
  }

  # ── API (Spring Boot via LogstashEncoder → JSON) ──────────────────────────
  if [message] =~ /^\{/ {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
    mutate {
      rename => {
        "level"        => "log_level"
        "logger_name"  => "logger"
      }
      add_field => { "service_type" => "api" }
      remove_field => ["service"]
    }
  }

  # ── Simulators: [metric] simulatorId: value unit ──────────────────────────
  # Must match exactly: [word] text: number unit — not infrastructure [TIMESTAMP][LEVEL]
  else if [message] =~ /^\[[a-z_]+\] [^\[]+: [0-9]/ {
    grok {
      match => { "message" => "^\[%{WORD:metric}\] %{DATA:simulator_id}: %{NUMBER:metric_value:float} %{GREEDYDATA:metric_unit}" }
    }
    mutate { add_field => { "service_type" => "simulator" } }
  }

  # ── Infrastructure: [TIMESTAMP][LEVEL][logger] message ───────────────────
  else {
    grok {
      match => { "message" => "^\[%{TIMESTAMP_ISO8601:log_timestamp}\]\[%{LOGLEVEL:log_level}%{SPACE}\]\[%{DATA:logger}\]%{SPACE}%{GREEDYDATA:log_message}" }
      tag_on_failure => []
    }
    mutate { add_field => { "service_type" => "infrastructure" } }
  }

  # ── Normalize log_level ───────────────────────────────────────────────────
  if [log_level] {
    mutate { uppercase => ["log_level"] }
    mutate {
      gsub => [
        "log_level", "WARNING", "WARN",
        "log_level", "NOTICE",  "INFO",
        "log_level", "VERBOSE", "DEBUG"
      ]
    }
  }

  # ── Enrich with container name ────────────────────────────────────────────
  if [container][name] {
    mutate { add_field => { "service_name" => "%{[container][name]}" } }
  }

  mutate {
    remove_field => ["agent", "ecs", "input", "host", "log", "stream", "tags", "service", "service.name", "event"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "agrisense-%{+YYYY.MM.dd}"
  }
}
