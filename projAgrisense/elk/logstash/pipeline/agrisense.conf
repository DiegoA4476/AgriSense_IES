input {
  beats {
    port => 5044
  }
}

filter {
  # Try to parse JSON logs (Spring Boot structured output)
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
    if [parsed] {
      mutate {
        rename => {
          "[parsed][level]"          => "level"
          "[parsed][logger_name]"    => "logger"
          "[parsed][message]"        => "log_message"
          "[parsed][stack_trace]"    => "stack_trace"
        }
      }
    }
  }

  mutate {
    add_field => { "service" => "%{[container][name]}" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "agrisense-%{+YYYY.MM.dd}"
  }
}
